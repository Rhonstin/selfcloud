# Unified Immich Docker Compose
# Hardware acceleration options are included as commented sections.
# Uncomment the relevant section(s) to enable them.
#
# WARNING: To install Immich, follow our guide: https://docs.immich.app/install/docker-compose
# Make sure to use the docker-compose.yml of the current release:
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env.dockhand
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    # ── Transcoding hardware acceleration ──────────────────────────────────────
    # Uncomment ONE of the blocks below that matches your hardware.
    #
    # NVIDIA (nvenc):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, compute, video]
    #
    # Intel QuickSync:
    devices:
      - /dev/dri:/dev/dri
    #
    # Rockchip MPP (rkmpp):
    # security_opt:
    #   - systempaths=unconfined
    #   - apparmor=unconfined
    # group_add:
    #   - video
    # devices:
    #   - /dev/rga:/dev/rga
    #   - /dev/dri:/dev/dri
    #   - /dev/dma_heap:/dev/dma_heap
    #   - /dev/mpp_service:/dev/mpp_service
    #   # - /dev/mali0:/dev/mali0  # only for OpenCL HDR->SDR tonemapping
    # volumes:
    #   - ${UPLOAD_LOCATION}:/data
    #   - /etc/localtime:/etc/localtime:ro
    #   # - /etc/OpenCL:/etc/OpenCL:ro  # only for OpenCL HDR->SDR tonemapping
    #   # - /usr/lib/aarch64-linux-gnu/libmali.so.1:/usr/lib/aarch64-linux-gnu/libmali.so.1:ro
    #
    # VAAPI:
    # devices:
    #   - /dev/dri:/dev/dri
    #
    # VAAPI on WSL2:
    # devices:
    #   - /dev/dri:/dev/dri
    #   - /dev/dxg:/dev/dxg
    # volumes:
    #   - ${UPLOAD_LOCATION}:/data
    #   - /etc/localtime:/etc/localtime:ro
    #   - /usr/lib/wsl:/usr/lib/wsl
    # environment:
    #   - LIBVA_DRIVER_NAME=d3d12
    # ───────────────────────────────────────────────────────────────────────────

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add the appropriate suffix to the image tag:
    # -armnn | -cuda | -rocm | -openvino | -rknn
    # Example: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    env_file:
      - .env.dockhand
    restart: always
    healthcheck:
      disable: false
    # ── ML hardware acceleration ───────────────────────────────────────────────
    # Uncomment ONE of the blocks below that matches your hardware.
    #
    # ARM Mali (armnn):
    # devices:
    #   - /dev/mali0:/dev/mali0
    # volumes:
    #   - model-cache:/cache
    #   - /lib/firmware/mali_csffw.bin:/lib/firmware/mali_csffw.bin:ro
    #   - /usr/lib/libmali.so:/usr/lib/libmali.so:ro
    #
    # Rockchip NPU (rknn):
    # security_opt:
    #   - systempaths=unconfined
    #   - apparmor=unconfined
    # devices:
    #   - /dev/dri:/dev/dri
    #
    # NVIDIA CUDA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    #
    # AMD ROCm:
    # group_add:
    #   - video
    # devices:
    #   - /dev/dri:/dev/dri
    #   - /dev/kfd:/dev/kfd
    #
    # Intel OpenVINO:
    # device_cgroup_rules:
    #   - 'c 189:* rmw'
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - model-cache:/cache
      - /dev/bus/usb:/dev/bus/usb
    #
    # Intel OpenVINO on WSL2:
    # devices:
    #   - /dev/dri:/dev/dri
    #   - /dev/dxg:/dev/dxg
    # volumes:
    #   - model-cache:/cache
    #   - /dev/bus/usb:/dev/bus/usb
    #   - /usr/lib/wsl:/usr/lib/wsl
    # ───────────────────────────────────────────────────────────────────────────

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment if your database is stored on HDDs (not SSDs):
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache: